apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion-service
  namespace: pharmasignal
  labels:
    app: ingestion-service
    version: "1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ingestion-service
  template:
    metadata:
      labels:
        app: ingestion-service
    spec:
      containers:
        - name: ingestion
          image: pharmasignalregistry.azurecr.io/ingestion:latest
          ports:
            - containerPort: 8001
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: pharmasignal-secrets
                  key: database-url
            - name: AZURE_OPENAI_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: pharmasignal-secrets
                  key: azure-openai-endpoint
            - name: AZURE_OPENAI_KEY
              valueFrom:
                secretKeyRef:
                  name: pharmasignal-secrets
                  key: azure-openai-key
            - name: AZURE_OPENAI_CHAT_DEPLOYMENT
              value: "gpt-4o"
            - name: AZURE_OPENAI_EMBEDDING_DEPLOYMENT
              value: "text-embedding-ada-002"
            - name: AZURE_OPENAI_API_VERSION
              value: "2024-12-01-preview"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ingestion-service
  namespace: pharmasignal
spec:
  selector:
    app: ingestion-service
  ports:
    - protocol: TCP
      port: 8001
      targetPort: 8001
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ingestion-hpa
  namespace: pharmasignal
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ingestion-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
