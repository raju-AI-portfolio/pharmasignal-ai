apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator-service
  namespace: pharmasignal
  labels:
    app: orchestrator-service
    version: "1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orchestrator-service
  template:
    metadata:
      labels:
        app: orchestrator-service
    spec:
      containers:
        - name: orchestrator
          image: pharmasignalregistry.azurecr.io/orchestrator:latest
          ports:
            - containerPort: 8003
          env:
            - name: AZURE_OPENAI_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: pharmasignal-secrets
                  key: azure-openai-endpoint
            - name: AZURE_OPENAI_KEY
              valueFrom:
                secretKeyRef:
                  name: pharmasignal-secrets
                  key: azure-openai-key
            - name: AZURE_OPENAI_CHAT_DEPLOYMENT
              value: "gpt-4o"
            - name: AZURE_OPENAI_API_VERSION
              value: "2024-12-01-preview"
            - name: RAG_SERVICE_URL
              value: "http://rag-service:8002"
            - name: INGESTION_SERVICE_URL
              value: "http://ingestion-service:8001"
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8003
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8003
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator-service
  namespace: pharmasignal
spec:
  selector:
    app: orchestrator-service
  ports:
    - protocol: TCP
      port: 8003
      targetPort: 8003
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: orchestrator-hpa
  namespace: pharmasignal
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: orchestrator-service
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
