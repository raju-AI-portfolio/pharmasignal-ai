apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-service
  namespace: pharmasignal
  labels:
    app: rag-service
    version: "1.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-service
  template:
    metadata:
      labels:
        app: rag-service
    spec:
      containers:
        - name: rag
          image: pharmasignalregistry.azurecr.io/rag:latest
          ports:
            - containerPort: 8002
          env:
            - name: AZURE_OPENAI_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: pharmasignal-secrets
                  key: azure-openai-endpoint
            - name: AZURE_OPENAI_KEY
              valueFrom:
                secretKeyRef:
                  name: pharmasignal-secrets
                  key: azure-openai-key
            - name: AZURE_OPENAI_EMBEDDING_DEPLOYMENT
              value: "text-embedding-ada-002"
            - name: AZURE_OPENAI_API_VERSION
              value: "2024-12-01-preview"
            - name: VECTOR_STORE
              value: "chroma"
            - name: CHROMA_PATH
              value: "./data/chroma"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8002
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: rag-service
  namespace: pharmasignal
spec:
  selector:
    app: rag-service
  ports:
    - protocol: TCP
      port: 8002
      targetPort: 8002
  type: ClusterIP
