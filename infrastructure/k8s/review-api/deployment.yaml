apiVersion: apps/v1
kind: Deployment
metadata:
  name: review-api-service
  namespace: pharmasignal
  labels:
    app: review-api-service
    version: "1.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: review-api-service
  template:
    metadata:
      labels:
        app: review-api-service
    spec:
      containers:
        - name: review-api
          image: pharmasignalregistry.azurecr.io/review-api:latest
          ports:
            - containerPort: 8004
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: pharmasignal-secrets
                  key: database-url
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8004
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8004
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: review-api-service
  namespace: pharmasignal
spec:
  selector:
    app: review-api-service
  ports:
    - protocol: TCP
      port: 8004
      targetPort: 8004
  type: ClusterIP
